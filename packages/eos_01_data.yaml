# ============================================================
# EnergyOS — Laag 1 — DATA
# ============================================================
# Genormaliseerde meetwaarden uit alle databronnen.
# Andere lagen gebruiken UITSLUITEND deze sensor.eos_* namen,
# nooit direct de upstream-entiteiten. Daarmee is een bronwissel
# (bv. ander tarief- of PV-systeem) een lokale wijziging.
# ============================================================

template:
  - sensor:
      # ─── Vermogensstromen ────────────────────────────────
      - name: "eos_solar_power_w"
        unique_id: eos_solar_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        # HW L1 = zonnepanelen; negatief = productie → negeer en klem op ≥ 0
        state: >
          {{ [states('sensor.schuur_marstek_3x_hw_solar_power_w') | float(0) * -1, 0] | max | round(0) }}
        icon: mdi:solar-power

      - name: "eos_grid_power_w"
        unique_id: eos_grid_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.esp32_s3_zero_p1_netto_vermogen_watt') | float(0) | round(0) }}
        icon: mdi:transmission-tower
        # Positief = import (huis trekt van net), negatief = export

      # ─── Per-fase vermogen (netto, signed: + = import) ───
      - name: "eos_grid_power_l1_w"
        unique_id: eos_grid_power_l1_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.esp32_s3_zero_p1_netto_vermogen_l1_watt') | float(0) | round(0) }}"
        icon: mdi:numeric-1-circle-outline

      - name: "eos_grid_power_l2_w"
        unique_id: eos_grid_power_l2_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.esp32_s3_zero_p1_netto_vermogen_l2_watt') | float(0) | round(0) }}"
        icon: mdi:numeric-2-circle-outline

      - name: "eos_grid_power_l3_w"
        unique_id: eos_grid_power_l3_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.esp32_s3_zero_p1_netto_vermogen_l3_watt') | float(0) | round(0) }}"
        icon: mdi:numeric-3-circle-outline

      - name: "eos_battery_power_w"
        unique_id: eos_battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {# Direct per-batterij optellen (Marstek package's
             house_total_battery_power_in_w werkt onbetrouwbaar
             door expand() op niet-bestaande M4/M5/M6).
             Marstek raw: positief = laden, negatief = ontladen.
             We inverteren naar HA-conventie: positief = ontladen. #}
          {% set m1 = states('sensor.marstek_3x_m1_battery_power') | float(0) %}
          {% set m2 = states('sensor.marstek_3x_m2_battery_power') | float(0) %}
          {% set m3 = states('sensor.marstek_3x_m3_battery_power') | float(0) %}
          {{ ((m1 + m2 + m3) * -1) | round(0) }}
        icon: mdi:battery-charging

      - name: "eos_hp_power_w"
        unique_id: eos_hp_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.openquatt_total_power_input') | float(0) | round(0) }}
        icon: mdi:heat-pump

      # ─── Batterij toestand ───────────────────────────────
      - name: "eos_battery_soc_estimate_pct"
        unique_id: eos_battery_soc_estimate_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >
          {# Direct per-batterij uitmiddelen — zelfde aanpak als battery power.
             input_number.house_battery_total_available_energy werkt onbetrouwbaar
             bij setups met minder dan 6 batterijen. #}
          {% set s1 = states('sensor.marstek_3x_m1_battery_state_of_charge') | float(-1) %}
          {% set s2 = states('sensor.marstek_3x_m2_battery_state_of_charge') | float(-1) %}
          {% set s3 = states('sensor.marstek_3x_m3_battery_state_of_charge') | float(-1) %}
          {% set valid = [s1, s2, s3] | select('>=', 0) | list %}
          {{ ((valid | sum) / (valid | length)) | round(1) if valid | length > 0 else 0 }}
        icon: mdi:battery

      - name: "eos_battery_energy_max_kwh"
        unique_id: eos_battery_energy_max_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: "15.36"

      - name: "eos_battery_energy_available_kwh"
        unique_id: eos_battery_energy_available_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {% set soc = states('sensor.eos_battery_soc_estimate_pct') | float(0) %}
          {{ (soc / 100 * 15.36) | round(2) }}
        icon: mdi:battery

      # ─── Tarief ──────────────────────────────────────────
      - name: "eos_tariff_eur_kwh"
        unique_id: eos_tariff_eur_kwh
        unit_of_measurement: "€/kWh"
        state_class: measurement
        state: >
          {{ states('sensor.zonneplan_current_electricity_tariff') | float(0) | round(4) }}
        icon: mdi:currency-eur

      # ── Auto-tariefdrempel: sorteer 24h Zonneplan forecast ──
      # Geeft de hoogste prijs van de goedkoopste N% uren terug.
      # Als forecast onbeschikbaar → valt terug op vaste drempel.
      - name: "eos_tariff_cheap_auto"
        unique_id: eos_tariff_cheap_auto
        unit_of_measurement: "€/kWh"
        icon: mdi:chart-histogram
        state: >
          {% set _raw = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% set fc = _raw if (_raw is iterable and _raw is not string and _raw is not mapping) else [] %}
          {% set now_ts = as_timestamp(now()) | int %}
          {% set ns = namespace(prices=[]) %}
          {% for item in fc %}
            {% set ts = as_timestamp(item.datetime) | int %}
            {% if ts >= now_ts and ts < now_ts + 86400 %}
              {% set ns.prices = ns.prices + [(item.electricity_price | float(0)) / 10000000] %}
            {% endif %}
          {% endfor %}
          {% if ns.prices | length == 0 %}
            {{ states('input_number.eos_tariff_cheap') | float(0.10) }}
          {% else %}
            {% set sorted = ns.prices | sort %}
            {% set frac = states('input_number.eos_tariff_cheap_fraction') | float(33) / 100 %}
            {% set idx = [((sorted | length) * frac - 1) | int, 0] | max %}
            {{ sorted[idx] | round(4) }}
          {% endif %}

      - name: "eos_tariff_expensive_auto"
        unique_id: eos_tariff_expensive_auto
        unit_of_measurement: "€/kWh"
        icon: mdi:chart-histogram
        state: >
          {% set _raw = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
          {% set fc = _raw if (_raw is iterable and _raw is not string and _raw is not mapping) else [] %}
          {% set now_ts = as_timestamp(now()) | int %}
          {% set ns = namespace(prices=[]) %}
          {% for item in fc %}
            {% set ts = as_timestamp(item.datetime) | int %}
            {% if ts >= now_ts and ts < now_ts + 86400 %}
              {% set ns.prices = ns.prices + [(item.electricity_price | float(0)) / 10000000] %}
            {% endif %}
          {% endfor %}
          {% if ns.prices | length == 0 %}
            {{ states('input_number.eos_tariff_expensive') | float(0.28) }}
          {% else %}
            {% set sorted = ns.prices | sort %}
            {% set frac = states('input_number.eos_tariff_expensive_fraction') | float(25) / 100 %}
            {% set idx = [((sorted | length) * (1 - frac)) | int, sorted | length - 1] | min %}
            {{ sorted[idx] | round(4) }}
          {% endif %}

      - name: "eos_tariff_level"
        unique_id: eos_tariff_level
        state: >
          {% set t = states('sensor.eos_tariff_eur_kwh') | float(0.20) %}
          {% set auto = is_state('input_boolean.eos_tariff_auto_threshold', 'on') %}
          {% if auto %}
            {% set cheap = states('sensor.eos_tariff_cheap_auto') | float(0.15) %}
            {% set exp   = states('sensor.eos_tariff_expensive_auto') | float(0.28) %}
          {% else %}
            {% set cheap = states('input_number.eos_tariff_cheap') | float(0.10) %}
            {% set exp   = states('input_number.eos_tariff_expensive') | float(0.28) %}
          {% endif %}
          {% if t <= cheap %}goedkoop
          {% elif t >= exp %}duur
          {% else %}normaal{% endif %}
        icon: mdi:tag-outline

      # ─── Afgeleide huishouding ────────────────────────────
      - name: "eos_house_base_load_w"
        unique_id: eos_house_base_load_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p_solar = states('sensor.eos_solar_power_w') | float(0) %}
          {% set p_grid  = states('sensor.eos_grid_power_w')  | float(0) %}
          {% set p_hp    = states('sensor.eos_hp_power_w') | float(0) %}
          {% set p_bat   = states('sensor.eos_battery_power_w') | float(0) %}
          {# bat charging = negatief (W gaat IN batterij) #}
          {% set p_bat_charging = [0 - p_bat, 0] | max %}
          {% set base = p_solar - p_grid - p_hp - p_bat_charging %}
          {{ [base, 0] | max | round(0) }}
        icon: mdi:home-lightning-bolt

      - name: "eos_solar_surplus_w"
        unique_id: eos_solar_surplus_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p_solar = states('sensor.eos_solar_power_w') | float(0) %}
          {% set p_base  = states('sensor.eos_house_base_load_w') | float(0) %}
          {% set p_hp    = states('sensor.eos_hp_power_w') | float(0) %}
          {# Surplus = PV-productie boven huis+HP. Nooit negatief —
             tekort komt anders uit batterij of grid, niet uit "PV-surplus" #}
          {{ [(p_solar - p_base - p_hp), 0] | max | round(0) }}
        icon: mdi:solar-power-variant

      # ─── Grid import/export split (voor dagelijkse kWh) ─────
      # Gesplitst zodat utility_meter per richting kan tellen.
      - name: "eos_grid_import_power_w"
        unique_id: eos_grid_import_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ [states('sensor.eos_grid_power_w') | float(0), 0] | max | round(0) }}"
        icon: mdi:transmission-tower-import

      - name: "eos_grid_export_power_w"
        unique_id: eos_grid_export_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ [(states('sensor.eos_grid_power_w') | float(0)) * -1, 0] | max | round(0) }}"
        icon: mdi:transmission-tower-export

      # ─── Solar productie (altijd ≥ 0, identiek aan eos_solar_power_w) ─
      # Aparte sensor zodat de integratie losstaat van de signed versie.
      - name: "eos_solar_production_power_w"
        unique_id: eos_solar_production_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ [states('sensor.eos_solar_power_w') | float(0), 0] | max | round(0) }}"
        icon: mdi:solar-power

      # ─── Importkosten / exportopbrengst rate (€/h) ──────────
      # (W / 1000) × (€/kWh) = €/h — daarna integreren → cumulatieve €
      - name: "eos_grid_import_cost_rate_eur_h"
        unique_id: eos_grid_import_cost_rate_eur_h
        unit_of_measurement: "€/h"
        state_class: measurement
        state: >
          {{ ((states('sensor.eos_grid_import_power_w') | float(0)) / 1000
              * (states('sensor.eos_tariff_eur_kwh') | float(0))) | round(5) }}
        icon: mdi:cash-minus

      - name: "eos_grid_export_revenue_rate_eur_h"
        unique_id: eos_grid_export_revenue_rate_eur_h
        unit_of_measurement: "€/h"
        state_class: measurement
        state: >
          {{ ((states('sensor.eos_grid_export_power_w') | float(0)) / 1000
              * (states('sensor.eos_tariff_eur_kwh') | float(0))) | round(5) }}
        icon: mdi:cash-plus

      # ─── Batterij laad/ontlaad split (voor dagelijkse kWh) ──
      # eos_battery_power_w: positief = ontladen, negatief = laden (HA-conventie)
      - name: "eos_battery_charge_power_w"
        unique_id: eos_battery_charge_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ [states('sensor.eos_battery_power_w') | float(0) * -1, 0] | max | round(0) }}"
        icon: mdi:battery-arrow-down-outline

      - name: "eos_battery_discharge_power_w"
        unique_id: eos_battery_discharge_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ [states('sensor.eos_battery_power_w') | float(0), 0] | max | round(0) }}"
        icon: mdi:battery-arrow-up-outline

      # ─── Thermisch ───────────────────────────────────────
      - name: "eos_hp_supply_temp_c"
        unique_id: eos_hp_supply_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {{ states('sensor.openquatt_system_supply_temp') | float(0) | round(1) }}

      - name: "eos_outside_temp_c"
        unique_id: eos_outside_temp_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {{ states('sensor.openquatt_outside_temperature_local_aggregated') | float(0) | round(1) }}

      - name: "eos_dhw_top_c"
        unique_id: eos_dhw_top_c
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {{ states('sensor.openquatt_cwt_ch1_dhw_tank_top') | float(0) | round(1) }}

      # ─── Grid cumulatief kWh (rechtstreeks van slimme meter) ─
      # P1 DSMR levert hardware-tellers die nooit resetten → utility_meter
      # werkt correct zonder 5-min accumulatie-hack.
      - name: "eos_grid_import_cumulative_kwh"
        unique_id: eos_grid_import_cumulative_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:transmission-tower-import
        state: >
          {{ (states('sensor.esp32_s3_zero_p1_energie_verbruik_tarief_1') | float(0) +
              states('sensor.esp32_s3_zero_p1_energie_verbruik_tarief_2') | float(0)) | round(3) }}

      - name: "eos_grid_export_cumulative_kwh"
        unique_id: eos_grid_export_cumulative_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:transmission-tower-export
        state: >
          {{ (states('sensor.esp32_s3_zero_p1_energie_teruglevering_tarief_1') | float(0) +
              states('sensor.esp32_s3_zero_p1_energie_teruglevering_tarief_2') | float(0)) | round(3) }}

  - binary_sensor:
      - name: "eos_solar_active"
        unique_id: eos_solar_active
        state: "{{ states('sensor.eos_solar_power_w') | float(0) > 150 }}"
        icon: mdi:white-balance-sunny

      - name: "eos_grid_importing"
        unique_id: eos_grid_importing
        state: "{{ states('sensor.eos_grid_power_w') | float(0) > 50 }}"

      - name: "eos_grid_exporting"
        unique_id: eos_grid_exporting
        state: "{{ states('sensor.eos_grid_power_w') | float(0) < -50 }}"

      - name: "eos_grid_over_soft"
        unique_id: eos_grid_over_soft
        state: >
          {{ states('sensor.eos_grid_power_w') | float(0) >
             states('input_number.eos_grid_soft_limit_w') | float(13000) }}

      - name: "eos_grid_over_hard"
        unique_id: eos_grid_over_hard
        state: >
          {{ states('sensor.eos_grid_power_w') | float(0) >
             states('input_number.eos_grid_hard_limit_w') | float(16000) }}

      # ─── EV beveiliging ─────────────────────────────────
      # Detecteert of de auto aan de lader staat via Zonneplan/laadpaal-entiteit.
      # Als AAN → blokkeer batterijladen in alle strategieën (zie eos_strategies.yaml).
      - name: "eos_ev_charging"
        unique_id: eos_ev_charging
        device_class: plug
        state: >
          {{ states('sensor.ev_stop_trigger_autos_aan_de_lader_thuis').lower()
             not in ['off', 'uit', '0', 'false', 'unavailable', 'unknown', 'none', ''] }}
        icon: mdi:ev-station

      # ─── Per-fase over-limiet ────────────────────────────
      - name: "eos_grid_l1_over_limit"
        unique_id: eos_grid_l1_over_limit
        state: >
          {{ states('sensor.eos_grid_power_l1_w') | float(0) >
             states('input_number.eos_grid_phase_limit_w') | float(5500) }}
        icon: mdi:alert-circle

      - name: "eos_grid_l2_over_limit"
        unique_id: eos_grid_l2_over_limit
        state: >
          {{ states('sensor.eos_grid_power_l2_w') | float(0) >
             states('input_number.eos_grid_phase_limit_w') | float(5500) }}
        icon: mdi:alert-circle

      - name: "eos_grid_l3_over_limit"
        unique_id: eos_grid_l3_over_limit
        state: >
          {{ states('sensor.eos_grid_power_l3_w') | float(0) >
             states('input_number.eos_grid_phase_limit_w') | float(5500) }}
        icon: mdi:alert-circle

      # ─── OpenQuatt DHW solar boost bridge ───────────────
      # OpenQuatt polls ha_dhw_solar_boost_entity_id = binary_sensor.openquatt_ext_dhw_solar_boost
      # (zie oq_substitutions_common.yaml). Deze sensor bridget de EOS input_boolean naar
      # het verwachte entity_id zonder OpenQuatt firmware aanpassing.
      - name: "openquatt_ext_dhw_solar_boost"
        unique_id: openquatt_ext_dhw_solar_boost
        device_class: running
        state: "{{ is_state('input_boolean.eos_dhw_solar_boost_active', 'on') }}"
        icon: mdi:water-boiler-auto

# ─── Grid energie-integratie (W → kWh cumulatief) ──────────
# platform: integration werkt niet betrouwbaar in HA packages (deprecated 2024.x).
# Triggered template elke 5 minuten: delta = P_w × (5/60) / 1000 kWh.
# State wordt door HA automatisch hersteld na herstart vanuit de recorder.

  - trigger:
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "eos_battery_charge_cumulative_kwh"
        unique_id: eos_battery_charge_cumulative_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:battery-arrow-down-outline
        state: >
          {% set last  = states('sensor.eos_battery_charge_cumulative_kwh') | float(0) %}
          {% set power = states('sensor.eos_battery_charge_power_w') | float(0) %}
          {{ [last + power / 12000, last] | max | round(4) }}

      - name: "eos_battery_discharge_cumulative_kwh"
        unique_id: eos_battery_discharge_cumulative_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:battery-arrow-up-outline
        state: >
          {% set last  = states('sensor.eos_battery_discharge_cumulative_kwh') | float(0) %}
          {% set power = states('sensor.eos_battery_discharge_power_w') | float(0) %}
          {{ [last + power / 12000, last] | max | round(4) }}

      - name: "eos_solar_production_cumulative_kwh"
        unique_id: eos_solar_production_cumulative_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:solar-power
        state: >
          {% set last  = states('sensor.eos_solar_production_cumulative_kwh') | float(0) %}
          {% set power = states('sensor.eos_solar_production_power_w') | float(0) %}
          {{ [last + power / 12000, last] | max | round(4) }}

      - name: "eos_grid_import_cost_cumulative_eur"
        unique_id: eos_grid_import_cost_cumulative_eur
        unit_of_measurement: "€"
        state_class: total_increasing
        icon: mdi:cash-minus
        state: >
          {% set last = states('sensor.eos_grid_import_cost_cumulative_eur') | float(0) %}
          {% set rate = states('sensor.eos_grid_import_cost_rate_eur_h') | float(0) %}
          {{ [last + rate / 12, last] | max | round(5) }}

      - name: "eos_grid_export_revenue_cumulative_eur"
        unique_id: eos_grid_export_revenue_cumulative_eur
        unit_of_measurement: "€"
        state_class: total_increasing
        icon: mdi:cash-plus
        state: >
          {% set last = states('sensor.eos_grid_export_revenue_cumulative_eur') | float(0) %}
          {% set rate = states('sensor.eos_grid_export_revenue_rate_eur_h') | float(0) %}
          {{ [last + rate / 12, last] | max | round(5) }}

utility_meter:
  eos_today_grid_import_meter:
    source: sensor.eos_grid_import_cumulative_kwh
    cycle: daily
    name: "EOS Grid import vandaag"

  eos_today_grid_export_meter:
    source: sensor.eos_grid_export_cumulative_kwh
    cycle: daily
    name: "EOS Grid export vandaag"

  eos_today_battery_charge_meter:
    source: sensor.eos_battery_charge_cumulative_kwh
    cycle: daily
    name: "EOS Batterij geladen vandaag"

  eos_today_battery_discharge_meter:
    source: sensor.eos_battery_discharge_cumulative_kwh
    cycle: daily
    name: "EOS Batterij ontladen vandaag"

  eos_today_solar_production_meter:
    source: sensor.eos_solar_production_cumulative_kwh
    cycle: daily
    name: "EOS Zonproductie vandaag"

  eos_month_solar_production_meter:
    source: sensor.eos_solar_production_cumulative_kwh
    cycle: monthly
    name: "EOS Zonproductie deze maand"

  eos_today_grid_import_cost_meter:
    source: sensor.eos_grid_import_cost_cumulative_eur
    cycle: daily
    name: "EOS Importkosten vandaag"

  eos_today_grid_export_revenue_meter:
    source: sensor.eos_grid_export_revenue_cumulative_eur
    cycle: daily
    name: "EOS Exportopbrengst vandaag"

  # ─── Maandelijkse meters ──────────────────────────────────
  eos_month_grid_import_kwh_meter:
    source: sensor.eos_grid_import_cumulative_kwh
    cycle: monthly
    name: "EOS Grid import deze maand"

