# ============================================================
# EnergyOS — HomeWizard kWh meter (lokale JSON API v1)
# IP:    192.168.1.16  |  Poll: elke 5 s
#
# Sub-verdeling layout:
#   L1 = batterij (sub-fase)
#   L2 = batterij (sub-fase)
#   L3 = zonnepanelen
#
# Teken-conventie (HomeWizard): negatief = levering aan net/huis
#   Solar produceert → L3 negatief
#   Batterij ontlaadt → negatief
#   Batterij laadt    → positief
# ============================================================

interval:
  - interval: 1s
    then:
      - http_request.get:
          url: "http://192.168.1.16/api/v1/data"
          capture_response: true
          max_response_buffer_size: 4096
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    // Sub-verdeling totaal
                    id(hw_subpanel_power_w).publish_state(root["active_power_w"] | 0.0f);

                    // L1 = batterij (negatief = ontladen, positief = laden)
                    id(hw_bat_l1_power_w).publish_state(root["active_power_l1_w"] | 0.0f);
                    id(hw_bat_l1_current_a).publish_state(root["active_current_l1_a"] | 0.0f);
                    id(hw_bat_l1_voltage_v).publish_state(root["active_voltage_l1_v"] | 0.0f);

                    // L2 = batterij (negatief = ontladen, positief = laden)
                    id(hw_bat_l2_power_w).publish_state(root["active_power_l2_w"] | 0.0f);
                    id(hw_bat_l2_current_a).publish_state(root["active_current_l2_a"] | 0.0f);
                    id(hw_bat_l2_voltage_v).publish_state(root["active_voltage_l2_v"] | 0.0f);

                    // L3 = zonnepanelen (negatief = productie)
                    id(hw_solar_power_w).publish_state(root["active_power_l3_w"] | 0.0f);
                    id(hw_solar_current_a).publish_state(root["active_current_l3_a"] | 0.0f);
                    id(hw_solar_voltage_v).publish_state(root["active_voltage_l3_v"] | 0.0f);

                    // Cumulatieve tellers (totaal sub-verdeling: solar + batterijen)
                    id(hw_subpanel_import_kwh).publish_state(root["total_power_import_kwh"] | 0.0f);
                    id(hw_subpanel_export_kwh).publish_state(root["total_power_export_kwh"] | 0.0f);

                    id(hw_frequency_hz).publish_state(root["active_frequency_hz"] | 50.0f);
                    return true;
                  });

sensor:
  # ── Sub-verdeling totaal ───────────────────────────────────
  - platform: template
    name: "HW Subpanel Power W"
    id: hw_subpanel_power_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:solar-panel-large
    web_server:
      sorting_group_id: Status
      sorting_weight: 10

  # ── L1 — Batterij ─────────────────────────────────────────
  - platform: template
    name: "HW Bat L1 Power W"
    id: hw_bat_l1_power_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:battery-charging
    web_server:
      sorting_group_id: Status
      sorting_weight: 11

  - platform: template
    name: "HW Bat L1 Current A"
    id: hw_bat_l1_current_a
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    entity_category: diagnostic

  - platform: template
    name: "HW Bat L1 Voltage V"
    id: hw_bat_l1_voltage_v
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic

  # ── L2 — Batterij ─────────────────────────────────────────
  - platform: template
    name: "HW Bat L2 Power W"
    id: hw_bat_l2_power_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:battery-charging
    web_server:
      sorting_group_id: Status
      sorting_weight: 12

  - platform: template
    name: "HW Bat L2 Current A"
    id: hw_bat_l2_current_a
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    entity_category: diagnostic

  - platform: template
    name: "HW Bat L2 Voltage V"
    id: hw_bat_l2_voltage_v
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic

  # ── L3 — Zonnepanelen ─────────────────────────────────────
  - platform: template
    name: "HW Solar Power W"
    id: hw_solar_power_w
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:solar-power
    web_server:
      sorting_group_id: Status
      sorting_weight: 13

  - platform: template
    name: "HW Solar Current A"
    id: hw_solar_current_a
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    entity_category: diagnostic

  - platform: template
    name: "HW Solar Voltage V"
    id: hw_solar_voltage_v
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic

  # ── Cumulatieve kWh sub-verdeling ─────────────────────────
  - platform: template
    name: "HW Subpanel Import kWh"
    id: hw_subpanel_import_kwh
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:solar-panel

  - platform: template
    name: "HW Subpanel Export kWh"
    id: hw_subpanel_export_kwh
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:transmission-tower-export

  # ── Netfrequentie ─────────────────────────────────────────
  - platform: template
    name: "HW Frequency Hz"
    id: hw_frequency_hz
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 3
    entity_category: diagnostic
