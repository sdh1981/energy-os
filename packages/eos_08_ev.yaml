# ============================================================
# EnergyOS — Laag 8 — EV Slim Laden (Peblar)
# ============================================================
# Stuurt de Peblar laadpaal aan op basis van Zonneplan forecast.
#
# Peblar entiteiten:
#   switch.peblar_ev_charger_opladen       → laden start/stop
#   number.peblar_ev_charger_laadlimiet    → laadstroom in A (6–32)
#   sensor.peblar_ev_charger_status        → laadstatus (charging/connected/disconnected)
#   sensor.peblar_ev_charger_sessie_energie → kWh huidige sessie
#
# Strategie:
#   1. Goedkoop venster begint → Peblar aan op eos_ev_max_current_a
#   2. Duur tarief terwijl laden actief → stroom terug naar eos_ev_min_current_a
#   3. Tarief normaal/goedkoop → stroom herstellen naar max
#   4. EV losgekoppeld → geen actie
#
# Master switch: input_boolean.eos_ev_smart_charge_enabled
# ============================================================

input_boolean:
  eos_ev_smart_charge_enabled:
    name: "EOS EV slim laden"
    icon: mdi:ev-station

  eos_ev_auto_start_enabled:
    name: "EOS EV automatisch starten in goedkoop venster"
    icon: mdi:play-circle-outline

input_number:
  eos_ev_charge_hours_target:
    name: "EOS EV benodigde laadtijd (uur)"
    min: 1
    max: 12
    step: 0.5
    initial: 4
    icon: mdi:clock-fast
    mode: slider

  eos_ev_max_current_a:
    name: "EOS EV max laadstroom (A)"
    min: 6
    max: 32
    step: 1
    initial: 16
    unit_of_measurement: "A"
    icon: mdi:current-ac
    mode: slider

  eos_ev_min_current_a:
    name: "EOS EV min laadstroom bij duur tarief (A)"
    min: 6
    max: 16
    step: 1
    initial: 6
    unit_of_measurement: "A"
    icon: mdi:current-ac
    mode: slider

template:
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: state
        entity_id: sensor.zonneplan_current_electricity_tariff
      - platform: homeassistant
        event: start
    sensor:
      # ─── Goedkoopste EV-laadvenster start ────────────────────
      - name: "eos_ev_smart_window_start"
        unique_id: eos_ev_smart_window_start
        icon: mdi:ev-plug-type2
        state: >
          {% set fc = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [] %}
          {% set now_ts = as_timestamp(now()) | int %}
          {% set n = states('input_number.eos_ev_charge_hours_target') | float(4) | round(0, 'ceil') | int %}
          {% set ns = namespace(slots=[], best_i=-1, best_cost=1e9) %}
          {% for item in fc %}
            {% set ts = as_timestamp(item.datetime) | int %}
            {% if ts >= now_ts and ts < now_ts + 86400 %}
              {% set ns.slots = ns.slots + [{'ts': ts, 'p': (item.electricity_price | float(0)) / 10000000}] %}
            {% endif %}
          {% endfor %}
          {% set total = ns.slots | length %}
          {% for i in range([total - n + 1, 0] | max) %}
            {% set wc = namespace(v=0) %}
            {% for j in range(n) %}
              {% set wc.v = wc.v + ns.slots[i + j].p %}
            {% endfor %}
            {% if wc.v < ns.best_cost %}
              {% set ns.best_cost = wc.v %}
              {% set ns.best_i = i %}
            {% endif %}
          {% endfor %}
          {% if ns.best_i >= 0 %}
            {{ ns.slots[ns.best_i].ts | timestamp_custom('%H:%M', true) }}
          {% else %}onbekend{% endif %}

      - name: "eos_ev_smart_window_end"
        unique_id: eos_ev_smart_window_end
        icon: mdi:ev-plug-type2
        state: >
          {% set fc = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [] %}
          {% set now_ts = as_timestamp(now()) | int %}
          {% set n = states('input_number.eos_ev_charge_hours_target') | float(4) | round(0, 'ceil') | int %}
          {% set ns = namespace(slots=[], best_i=-1, best_cost=1e9) %}
          {% for item in fc %}
            {% set ts = as_timestamp(item.datetime) | int %}
            {% if ts >= now_ts and ts < now_ts + 86400 %}
              {% set ns.slots = ns.slots + [{'ts': ts, 'p': (item.electricity_price | float(0)) / 10000000}] %}
            {% endif %}
          {% endfor %}
          {% set total = ns.slots | length %}
          {% for i in range([total - n + 1, 0] | max) %}
            {% set wc = namespace(v=0) %}
            {% for j in range(n) %}
              {% set wc.v = wc.v + ns.slots[i + j].p %}
            {% endfor %}
            {% if wc.v < ns.best_cost %}
              {% set ns.best_cost = wc.v %}
              {% set ns.best_i = i %}
            {% endif %}
          {% endfor %}
          {% if ns.best_i >= 0 %}
            {{ (ns.slots[ns.best_i].ts + n * 3600) | timestamp_custom('%H:%M', true) }}
          {% else %}onbekend{% endif %}

      - name: "eos_ev_smart_window_avg_price"
        unique_id: eos_ev_smart_window_avg_price
        unit_of_measurement: "€/kWh"
        icon: mdi:currency-eur
        state: >
          {% set fc = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') or [] %}
          {% set now_ts = as_timestamp(now()) | int %}
          {% set n = states('input_number.eos_ev_charge_hours_target') | float(4) | round(0, 'ceil') | int %}
          {% set ns = namespace(slots=[], best_i=-1, best_cost=1e9) %}
          {% for item in fc %}
            {% set ts = as_timestamp(item.datetime) | int %}
            {% if ts >= now_ts and ts < now_ts + 86400 %}
              {% set ns.slots = ns.slots + [{'ts': ts, 'p': (item.electricity_price | float(0)) / 10000000}] %}
            {% endif %}
          {% endfor %}
          {% set total = ns.slots | length %}
          {% for i in range([total - n + 1, 0] | max) %}
            {% set wc = namespace(v=0) %}
            {% for j in range(n) %}
              {% set wc.v = wc.v + ns.slots[i + j].p %}
            {% endfor %}
            {% if wc.v < ns.best_cost %}
              {% set ns.best_cost = wc.v %}
              {% set ns.best_i = i %}
            {% endif %}
          {% endfor %}
          {% if ns.best_i >= 0 and n > 0 %}{{ (ns.best_cost / n) | round(4) }}
          {% else %}0{% endif %}

      # ─── EV laadadvies ───────────────────────────────────────
      - name: "eos_ev_charge_advice"
        unique_id: eos_ev_charge_advice
        icon: mdi:car-electric
        state: >
          {% set enabled   = is_state('input_boolean.eos_ev_smart_charge_enabled', 'on') %}
          {% set status    = states('sensor.peblar_ev_charger_status') | lower %}
          {% set connected = status not in ['disconnected', 'unavailable', 'unknown', ''] %}
          {% set charging  = 'charging' in status %}
          {% set level     = states('sensor.eos_tariff_level') %}
          {% set in_win    = is_state('binary_sensor.eos_ev_smart_window_active', 'on') %}
          {% set win_start = states('sensor.eos_ev_smart_window_start') %}
          {% set curr_lim  = states('number.peblar_ev_charger_laadlimiet') | int(0) %}
          {% set min_a     = states('input_number.eos_ev_min_current_a') | int(6) %}
          {% if not enabled %}Slim laden uit
          {% elif not connected %}Niet aangesloten
          {% elif in_win and charging and curr_lim > min_a %}Nu laden op vol vermogen ({{ (curr_lim * 230 / 1000) | round(1) }} kW)
          {% elif in_win and charging %}Nu laden — duur tarief beperkt stroom ({{ curr_lim }}A)
          {% elif in_win %}Goedkoop venster actief — laden starten
          {% elif level == 'duur' and charging %}Duur tarief — stroom beperkt tot {{ min_a }}A
          {% elif level == 'duur' %}Wachten — duur tarief, goedkoop venster {{ win_start }}
          {% else %}Wachten op goedkoopste venster ({{ win_start }}, {{ states('sensor.eos_ev_smart_window_avg_price') }} €/kWh){% endif %}

  - binary_sensor:
      # ─── Auto aangesloten ────────────────────────────────────
      - name: "eos_peblar_connected"
        unique_id: eos_peblar_connected
        device_class: plug
        state: >
          {% set s = states('sensor.peblar_ev_charger_status') | lower %}
          {{ s not in ['disconnected', 'unavailable', 'unknown', ''] }}

      # ─── Auto laadt actief ───────────────────────────────────
      - name: "eos_peblar_charging"
        unique_id: eos_peblar_charging
        device_class: battery_charging
        state: "{{ 'charging' in states('sensor.peblar_ev_charger_status') | lower }}"

      # ─── In het aanbevolen laadvenster ───────────────────────
      - name: "eos_ev_smart_window_active"
        unique_id: eos_ev_smart_window_active
        state: >
          {% set ws = states('sensor.eos_ev_smart_window_start') %}
          {% set we = states('sensor.eos_ev_smart_window_end') %}
          {% if ws in ['onbekend', 'unknown', 'unavailable'] %}false
          {% else %}
            {% set now_h = now().hour + now().minute / 60.0 %}
            {% set sh = ws.split(':')[0] | int(0) + ws.split(':')[1] | int(0) / 60.0 %}
            {% set eh = we.split(':')[0] | int(0) + we.split(':')[1] | int(0) / 60.0 %}
            {% if sh <= eh %}{{ now_h >= sh and now_h < eh }}
            {% else %}{{ now_h >= sh or now_h < eh }}{% endif %}
          {% endif %}

      # ─── Laadt op duur tarief (alert) ────────────────────────
      - name: "eos_ev_expensive_charge_alert"
        unique_id: eos_ev_expensive_charge_alert
        device_class: problem
        state: >
          {% set charging = 'charging' in states('sensor.peblar_ev_charger_status') | lower %}
          {% set level    = states('sensor.eos_tariff_level') %}
          {% set curr_lim = states('number.peblar_ev_charger_laadlimiet') | int(0) %}
          {% set min_a    = states('input_number.eos_ev_min_current_a') | int(6) %}
          {{ charging and level == 'duur' and curr_lim > min_a }}

automation:
  # ── Goedkoop venster start: Peblar aanzetten op max stroom ────
  - id: eos_ev_smart_window_start
    alias: "EOS EV: start laden bij goedkoop venster"
    trigger:
      - platform: state
        entity_id: binary_sensor.eos_ev_smart_window_active
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.eos_ev_smart_charge_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.eos_ev_auto_start_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.energy_os_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.eos_peblar_connected
        state: "on"
    action:
      - service: number.set_value
        target: {entity_id: number.peblar_ev_charger_laadlimiet}
        data: {value: "{{ states('input_number.eos_ev_max_current_a') | int(16) }}"}
      - service: switch.turn_on
        target: {entity_id: switch.peblar_ev_charger_opladen}
      - service: persistent_notification.create
        data:
          title: "EOS EV: laden gestart"
          message: >
            EV laden gestart in goedkoopste venster
            {{ states('sensor.eos_ev_smart_window_start') }}–{{ states('sensor.eos_ev_smart_window_end') }}
            ({{ states('sensor.eos_ev_smart_window_avg_price') }} €/kWh).
            Stroom: {{ states('input_number.eos_ev_max_current_a') | int }}A
            ({{ (states('input_number.eos_ev_max_current_a') | float * 230 / 1000) | round(1) }} kW).
          notification_id: eos_ev_smart

  # ── Duur tarief: stroom terugschroeven naar minimum ───────────
  - id: eos_ev_expensive_throttle
    alias: "EOS EV: laadstroom beperken bij duur tarief"
    trigger:
      - platform: state
        entity_id: sensor.eos_tariff_level
        to: "duur"
    condition:
      - condition: state
        entity_id: input_boolean.eos_ev_smart_charge_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.eos_peblar_charging
        state: "on"
    action:
      - service: number.set_value
        target: {entity_id: number.peblar_ev_charger_laadlimiet}
        data: {value: "{{ states('input_number.eos_ev_min_current_a') | int(6) }}"}
      - service: persistent_notification.create
        data:
          title: "EOS EV: stroom beperkt"
          message: >
            Duur tarief ({{ states('sensor.eos_tariff_eur_kwh') }} €/kWh) —
            EV laadstroom teruggebracht naar {{ states('input_number.eos_ev_min_current_a') | int }}A
            ({{ (states('input_number.eos_ev_min_current_a') | float * 230 / 1000) | round(1) }} kW).
            Goedkoper laden vanaf {{ states('sensor.eos_ev_smart_window_start') }}.
          notification_id: eos_ev_throttle

  # ── Tarief normaal/goedkoop: stroom herstellen ────────────────
  - id: eos_ev_restore_current
    alias: "EOS EV: laadstroom herstellen na duur tarief"
    trigger:
      - platform: state
        entity_id: sensor.eos_tariff_level
        to:
          - "goedkoop"
          - "normaal"
    condition:
      - condition: state
        entity_id: input_boolean.eos_ev_smart_charge_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.eos_peblar_charging
        state: "on"
      - condition: template
        value_template: >
          {{ states('number.peblar_ev_charger_laadlimiet') | int(16)
             < states('input_number.eos_ev_max_current_a') | int(16) }}
    action:
      - service: number.set_value
        target: {entity_id: number.peblar_ev_charger_laadlimiet}
        data: {value: "{{ states('input_number.eos_ev_max_current_a') | int(16) }}"}
      - service: persistent_notification.dismiss
        data: {notification_id: eos_ev_throttle}

  # ── Alert: laden op duur tarief zonder EOS throttle ──────────
  - id: eos_ev_expensive_alert
    alias: "EOS EV: waarschuwing laden op duur tarief"
    trigger:
      - platform: state
        entity_id: binary_sensor.eos_ev_expensive_charge_alert
        to: "on"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.eos_ev_smart_charge_enabled
        state: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "EOS EV: laden op duur tarief"
          message: >
            EV laadt met {{ states('number.peblar_ev_charger_laadlimiet') | int }}A
            op duur tarief ({{ states('sensor.eos_tariff_eur_kwh') }} €/kWh).
            Sessie-energie: {{ states('sensor.peblar_ev_charger_sessie_energie') | round(2) }} kWh.
            Goedkoper venster: {{ states('sensor.eos_ev_smart_window_start') }}–{{ states('sensor.eos_ev_smart_window_end') }}
            ({{ states('sensor.eos_ev_smart_window_avg_price') }} €/kWh).
          notification_id: eos_ev_expensive_alert

  - id: eos_ev_expensive_alert_clear
    alias: "EOS EV: waarschuwing wissen als alert verdwijnt"
    trigger:
      - platform: state
        entity_id: binary_sensor.eos_ev_expensive_charge_alert
        to: "off"
    action:
      - service: persistent_notification.dismiss
        data: {notification_id: eos_ev_expensive_alert}
